<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Playlist Progress Saver</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-6);
      background: var(--color-dark-bg);
      color: var(--color-text-on-dark);
    }
    .error-page .timestamp-chip {
      margin-bottom: var(--space-6);
    }
    .error-page h1 {
      font-size: var(--text-4xl);
      margin-bottom: var(--space-4);
    }
    .error-page p {
      color: var(--color-text-on-dark-secondary);
      max-width: 420px;
      margin-bottom: var(--space-8);
      font-size: var(--text-lg);
    }
    .error-track {
      width: 100%;
      max-width: 320px;
      height: 4px;
      background: rgba(248, 250, 252, 0.15);
      border-radius: var(--radius-full);
      position: relative;
      margin-bottom: var(--space-10);
    }
    .error-track::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: var(--color-primary);
      border-radius: var(--radius-full);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <span class="timestamp-chip">404:00</span>
    <h1>This timestamp doesn't exist.</h1>
    <p>The page you're looking for was moved, renamed, or never tracked in the first place.</p>
    <div class="error-track"></div>
    <a href="index.html" class="btn btn-primary">Back to Homepage</a>
  </div>
</body>
</html>
